allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"

subprojects {
    afterEvaluate {
        if (it.hasProperty("android")) {
            it.android.compileSdkVersion 35
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
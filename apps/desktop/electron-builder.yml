appId: com.supercoded.ocp-v1
productName: OCP-V1
copyright: Copyright © 2026 Supercoded
asar: true
asarUnpack:
  - node_modules/serialport/**/*
  - node_modules/@abandonware/noble/**/*
files:
  - out/**/*
  - build/**/*
  - assets/**/*
directories:
  buildResources: build
  output: dist
win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OCP-V1
  include: build/installer.nsh
  license: build/LICENSE.txt
publish:
  provider: github
  owner: supercoded
  repo: OCP-V1
  releaseType: release

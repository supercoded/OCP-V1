version: 0.1.0
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.35.5
  logging: ^1.3.0
  meta: ^1.16.0
  ocp_bridge_meshtastic:
    path: ../ocp_bridge_meshtastic
  ocp_odp:
    path: ../ocp_odp
  ocp_transport:
    path: ../ocp_transport

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

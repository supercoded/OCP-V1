name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/ocp_app/**'
      - 'packages/ocp_flutter_core/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/ocp_app/**'
      - 'packages/ocp_flutter_core/**'
      - '.github/workflows/flutter-ci.yml'
  workflow_dispatch:

jobs:
  flutter-analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies (core package)
        working-directory: packages/ocp_flutter_core
        run: flutter pub get

      - name: Get dependencies (app)
        working-directory: apps/ocp_app
        run: flutter pub get

      - name: Analyze core package
        working-directory: packages/ocp_flutter_core
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Analyze app
        working-directory: apps/ocp_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests (core)
        working-directory: packages/ocp_flutter_core
        run: flutter test || echo "No tests found or tests skipped"

      - name: Run tests (app)
        working-directory: apps/ocp_app
        run: flutter test || echo "No tests found or tests skipped"

  flutter-build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: flutter-analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies (core package)
        working-directory: packages/ocp_flutter_core
        run: flutter pub get

      - name: Get dependencies (app)
        working-directory: apps/ocp_app
        run: flutter pub get

      - name: Build Linux
        working-directory: apps/ocp_app
        run: flutter build linux

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: ocp-v1-linux
          path: apps/ocp_app/build/linux/x64/release/bundle/

  flutter-build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: flutter-analyze
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get dependencies (core package)
        working-directory: packages/ocp_flutter_core
        run: flutter pub get

      - name: Get dependencies (app)
        working-directory: apps/ocp_app
        run: flutter pub get

      - name: Build APK
        working-directory: apps/ocp_app
        run: flutter build apk --verbose

      - name: Debug build output
        if: always()
        working-directory: apps/ocp_app
        run: find build -name '*.apk' -o -name '*.aab' 2>/dev/null || echo 'No APK/AAB found'; ls -la build/app/outputs/ 2>/dev/null || echo 'No outputs dir'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ocp-v1-android-apk
          path: apps/ocp_app/build/app/outputs/flutter-apk/*.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [flutter-build-linux, flutter-build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ocp-v1-linux/**/*
            artifacts/ocp-v1-android-apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
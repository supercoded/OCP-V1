name: ocp_workspace
publish_to: none

environment:
  sdk: ^3.5.0

dev_dependencies:
  melos: ^8.1.0

workspace:
  - packages/ocp_storage
  - packages/ocp_core
  - packages/ocp_odp
  - packages/ocp_onp
  - packages/ocp_transport
  - packages/ocp_plugin_api
  - packages/ocp_bridge_meshtastic
  - packages/ocp_plugin_example
  - tools/mock_device
  - tools/benchmark

melos:
  scripts:
    analyze:
      run: melos exec -- dart analyze --fatal-infos
      description: Run dart analyze in all packages.
    test:
      run: melos run test:dart
      description: Run dart tests in workspace packages.
    test:dart:
      run: melos exec --dir-exists=test -- dart test
      description: Run dart tests.
    format:fix:
      run: melos exec -- dart format .
      description: Format all packages.
